version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: nexusmail-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MARIADB_DATABASE:-nexusmail}
      MYSQL_USER: ${MARIADB_USER:-nexusmail}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD:-nexusmail}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: nexusmail-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: nexusmail-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
  qdrant_data:
  redis_data:
